<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encyclopedie Cybersecurite - S1 / S2 / S3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* =============================================
   THERUST LAB - CHARTE GRAPHIQUE
   Bleu Abysse #132639
   Bleu Arc Electrique #00B4D8
   Rouille #B85C38
   ============================================= */

:root {
  --bleu-abysse: #132639;
  --bleu-abysse-dark: #0A1620;
  --bleu-cyan: #00B4D8;
  --rouille: #B85C38;
  --gris-clair: #E8E9EB;
  --gris-moyen: #7A7C7F;
  --gris-fonce: #3D3E40;
  --blanc: #FFFFFF;
  --card-bg: #1a3350;
  --card-hover: #1f3d5e;

  /* Family colors gradient */
  --fam-1: #00B4D8;  /* Hardening Systeme */
  --fam-2: #0098C8;  /* Authentification et Acces */
  --fam-3: #2080B0;  /* Audit et Journalisation */
  --fam-4: #4070A0;  /* Integrite et Conformite */
  --fam-5: #6862A0;  /* Architecture Reseau */
  --fam-6: #8854A0;  /* Securite Perimetrique */
  --fam-7: #A04678;  /* Attaques TCP/IP */
  --fam-8: #B04050;  /* SIEM et Detection */
  --fam-9: #B84840;  /* Referentiels et Normes */
  --fam-10: #B85038; /* Protocoles de Securite */
  --fam-11: #B85C38; /* Outils du Lab */
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Roboto', sans-serif;
  font-weight: 400;
  font-size: 16px;
  line-height: 1.5;
  background: var(--bleu-abysse-dark);
  color: var(--blanc);
  min-height: 100vh;
}

/* HEADER */
.header {
  background: var(--bleu-abysse);
  border-bottom: 4px solid var(--rouille);
  padding: 32px 40px 24px;
  text-align: center;
}

.header h1 {
  font-family: 'Roboto', sans-serif;
  font-weight: 700;
  font-size: 40px;
  line-height: 1.2;
  color: var(--blanc);
  margin-bottom: 8px;
}

.header .subtitle {
  font-family: 'Roboto Mono', monospace;
  font-weight: 400;
  font-size: 16px;
  color: var(--bleu-cyan);
  letter-spacing: 1px;
}

.header .meta {
  font-size: 14px;
  color: var(--gris-moyen);
  margin-top: 8px;
}

/* NAVIGATION TABS */
.nav-tabs {
  display: flex;
  justify-content: center;
  gap: 0;
  background: var(--bleu-abysse);
  border-bottom: 2px solid var(--bleu-cyan);
  padding: 0 20px;
  flex-wrap: wrap;
}

.nav-tab {
  padding: 12px 24px;
  font-family: 'Roboto', sans-serif;
  font-weight: 500;
  font-size: 15px;
  color: var(--gris-clair);
  background: transparent;
  border: none;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
  border-radius: 2px 2px 0 0;
}

.nav-tab:hover {
  color: var(--blanc);
  background: rgba(0, 180, 216, 0.08);
}

.nav-tab.active {
  color: var(--bleu-cyan);
  border-bottom-color: var(--bleu-cyan);
}

.nav-tab.active-anssi {
  color: var(--rouille);
  border-bottom-color: var(--rouille);
}

.nav-tab.active-abbr {
  color: var(--rouille);
  border-bottom-color: var(--rouille);
}

/* SEARCH + FILTER BAR */
.controls {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 16px;
  padding: 20px 40px;
  flex-wrap: wrap;
}

.search-box {
  position: relative;
  flex: 0 1 500px;
}

.search-box input {
  width: 100%;
  padding: 12px 16px 12px 44px;
  font-family: 'Roboto', sans-serif;
  font-size: 16px;
  color: var(--blanc);
  background: var(--bleu-abysse);
  border: 2px solid var(--gris-fonce);
  border-radius: 3px;
  outline: none;
  transition: border-color 0.2s;
}

.search-box input:focus {
  border-color: var(--bleu-cyan);
}

.search-box input::placeholder {
  color: var(--gris-moyen);
}

.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--gris-moyen);
  font-size: 18px;
  pointer-events: none;
}

.counter {
  font-family: 'Roboto Mono', monospace;
  font-size: 14px;
  color: var(--gris-moyen);
}

/* VIEW TOGGLE */
.view-section {
  display: none;
}

.view-section.active {
  display: block;
}

/* FAMILIES SECTION */
.families-section {
  padding: 0 40px;
}

/* FILTER PILLS */
.filter-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  padding: 8px 40px 20px;
}

.filter-pill {
  padding: 8px 16px;
  font-family: 'Roboto', sans-serif;
  font-weight: 500;
  font-size: 14px;
  background: var(--bleu-abysse);
  color: var(--gris-clair);
  border: 1px solid var(--gris-fonce);
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.2s;
}

.filter-pill:hover {
  border-color: var(--bleu-cyan);
  color: var(--blanc);
}

.filter-pill.active {
  background: var(--bleu-cyan);
  color: var(--bleu-abysse-dark);
  border-color: var(--bleu-cyan);
}

/* FAMILY GROUP */
.family-group {
  margin-bottom: 40px;
}

.family-title {
  font-family: 'Roboto', sans-serif;
  font-weight: 700;
  font-size: 26px;
  line-height: 1.2;
  padding: 12px 0 4px;
  border-left: 4px solid var(--fam-color, var(--bleu-cyan));
  padding-left: 16px;
  margin-bottom: 6px;
  color: var(--blanc);
}

.family-session {
  font-family: 'Roboto Mono', monospace;
  font-weight: 400;
  font-size: 13px;
  color: var(--fam-color, var(--bleu-cyan));
  padding-left: 20px;
  margin-bottom: 16px;
}

/* CARDS GRID -- format carte a jouer */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}

/* CARD -- fond colore par famille */
.card {
  background: var(--card-bg-color, var(--card-bg));
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 3px;
  padding: 24px 20px 20px;
  min-height: 320px;
  display: flex;
  flex-direction: column;
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
  cursor: default;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: var(--fam-color, var(--bleu-cyan));
  opacity: 0.6;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
  border-color: rgba(255, 255, 255, 0.15);
}

.card:hover::before {
  opacity: 1;
}

.card-name {
  font-family: 'Roboto', sans-serif;
  font-weight: 700;
  font-size: 20px;
  color: var(--bleu-cyan);
  margin-bottom: 4px;
}

.card-aka {
  font-family: 'Roboto Mono', monospace;
  font-size: 12px;
  color: rgba(255, 255, 255, 0.5);
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.08);
}

.card-desc {
  font-size: 15px;
  line-height: 1.6;
  color: var(--blanc);
  margin-bottom: auto;
  flex: 1;
}

.card-example {
  font-family: 'Roboto Mono', monospace;
  font-size: 12px;
  line-height: 1.5;
  color: rgba(255, 255, 255, 0.6);
  padding: 10px 12px;
  margin-top: 14px;
  background: rgba(0, 0, 0, 0.25);
  border-left: 3px solid var(--fam-color, var(--bleu-cyan));
  border-radius: 0 2px 2px 0;
}

.card-session-tag {
  position: absolute;
  top: 12px;
  right: 12px;
  font-family: 'Roboto Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 2px;
  background: rgba(0, 0, 0, 0.3);
  color: rgba(255, 255, 255, 0.5);
}

/* ANSSI TAB STYLES */
.anssi-content {
  padding: 20px 40px;
}

.anssi-section {
  margin-bottom: 40px;
}

.anssi-guide-header {
  font-family: 'Roboto', sans-serif;
  font-weight: 700;
  font-size: 22px;
  color: var(--blanc);
  margin-bottom: 20px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--rouille);
}

.anssi-recommendation {
  background: var(--card-bg);
  border-left: 4px solid var(--rouille);
  padding: 16px;
  margin-bottom: 12px;
  border-radius: 3px;
  display: flex;
  gap: 16px;
  align-items: flex-start;
}

.anssi-priority-badge {
  flex-shrink: 0;
  padding: 4px 10px;
  font-family: 'Roboto Mono', monospace;
  font-weight: 700;
  font-size: 11px;
  border-radius: 3px;
  text-align: center;
  min-width: 90px;
  white-space: nowrap;
}

.anssi-priority-indispensable {
  background: #2d7d3d;
  color: #ffffff;
}

.anssi-priority-recommande {
  background: #2d5f8e;
  color: #ffffff;
}

.anssi-priority-renforce {
  background: #5a5a5a;
  color: #ffffff;
}

.anssi-rec-content {
  flex: 1;
}

.anssi-rec-title {
  font-family: 'Roboto', sans-serif;
  font-weight: 600;
  font-size: 16px;
  color: var(--blanc);
  margin-bottom: 6px;
}

.anssi-rec-desc {
  font-size: 14px;
  color: var(--gris-clair);
  margin-bottom: 8px;
  line-height: 1.5;
}

.anssi-rec-ref {
  font-family: 'Roboto Mono', monospace;
  font-size: 12px;
  color: var(--gris-moyen);
}

/* ABBREVIATIONS SECTION */
.abbr-section {
  padding: 0 40px 40px;
}

.abbr-category {
  margin-bottom: 40px;
}

.abbr-category-title {
  font-family: 'Roboto', sans-serif;
  font-weight: 700;
  font-size: 20px;
  line-height: 1.2;
  padding: 12px 0 4px;
  border-left: 4px solid var(--bleu-cyan);
  padding-left: 16px;
  margin-bottom: 4px;
}

.abbr-category-desc {
  font-family: 'Roboto Mono', monospace;
  font-weight: 400;
  font-size: 13px;
  color: var(--gris-moyen);
  padding-left: 20px;
  margin-bottom: 12px;
  font-style: italic;
}

.abbr-table {
  width: 100%;
  border-collapse: collapse;
  background: var(--card-bg);
  border: 1px solid rgba(0, 180, 216, 0.2);
  border-radius: 3px;
  overflow: hidden;
}

.abbr-table tr {
  border-bottom: 1px solid rgba(0, 180, 216, 0.1);
}

.abbr-table tr:last-child {
  border-bottom: none;
}

.abbr-table th {
  background: var(--bleu-abysse);
  padding: 12px 16px;
  text-align: left;
  font-family: 'Roboto', sans-serif;
  font-weight: 600;
  font-size: 14px;
  color: var(--bleu-cyan);
  border-bottom: 2px solid var(--bleu-cyan);
}

.abbr-table td {
  padding: 12px 16px;
  font-size: 14px;
  line-height: 1.4;
}

.abbr-table td:first-child {
  font-family: 'Roboto Mono', monospace;
  font-weight: 600;
  color: var(--bleu-cyan);
  width: 100px;
}

.abbr-table td:last-child {
  color: var(--gris-clair);
}

.abbr-table tbody tr:hover {
  background: rgba(0, 180, 216, 0.08);
}

/* FOOTER */
.footer {
  background: var(--bleu-abysse);
  border-top: 2px solid var(--rouille);
  padding: 20px 40px;
  text-align: center;
  margin-top: 40px;
}

.footer p {
  font-size: 12px;
  color: var(--gris-moyen);
  margin: 4px 0;
}

/* PRINT STYLES */
@media print {
  body {
    background: white;
    color: black;
  }

  .header, .nav-tabs, .controls, .filter-pills, .footer {
    display: none;
  }

  .card, .abbr-table {
    page-break-inside: avoid;
    background: white;
    color: black;
    border: 1px solid #ddd;
  }

  .card-desc, .abbr-table td:last-child {
    color: black;
  }
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .header h1 {
    font-size: 28px;
  }

  .nav-tabs {
    padding: 0 10px;
  }

  .nav-tab {
    padding: 10px 12px;
    font-size: 13px;
  }

  .controls {
    padding: 16px 20px;
    gap: 8px;
  }

  .search-box {
    flex: 0 1 300px;
  }

  .cards-grid {
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
    padding: 0 20px;
  }

  .families-section, .abbr-section {
    padding: 0 20px;
  }

  .counter {
    display: none;
  }

  .anssi-recommendation {
    flex-direction: column;
    gap: 8px;
  }

  .abbr-table {
    font-size: 12px;
  }

  .abbr-table th, .abbr-table td {
    padding: 8px 10px;
  }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h1>Encyclopedie Cybersecurite</h1>
  <div class="subtitle">S1 Hardening • S2 Audit • S3 SIEM</div>
  <div class="meta">11 families | 84 concepts | 103 abreviations | ANSSI</div>
</div>

<!-- NAVIGATION TABS -->
<div class="nav-tabs">
  <button class="nav-tab active" onclick="switchView('families')">Familles & Concepts</button>
  <button class="nav-tab" onclick="switchView('anssi')">Referentiel ANSSI</button>
  <button class="nav-tab" onclick="switchView('abbr')">Abreviations</button>
</div>

<!-- SEARCH & CONTROLS -->
<div class="controls">
  <div class="search-box">
    <span class="search-icon">S</span>
    <input type="text" id="searchInput" placeholder="Rechercher un concept, une abreviation ou une recommandation ANSSI..." onkeyup="filterContent()">
  </div>
  <div class="counter"><span id="resultCount">0</span> resultats</div>
</div>

<!-- ===== FAMILIES & CONCEPTS VIEW ===== -->
<div id="families-view" class="view-section active">
  <div class="filter-pills" id="filterPills"></div>
  <div class="families-section" id="familiesContainer"></div>
</div>

<!-- ===== ANSSI REFERENTIEL VIEW ===== -->
<div id="anssi-view" class="view-section">
  <div class="anssi-content" id="anssiContainer"></div>
</div>

<!-- ===== ABBREVIATIONS VIEW ===== -->
<div id="abbr-view" class="view-section">
  <div class="abbr-section" id="abbrContainer"></div>
</div>

<!-- FOOTER -->
<div class="footer">
  <p>Baptiste Ochlafen • TheRustLab</p>
  <p>Sources open-source : MIT, BSD, Apache 2.0, CC BY-SA 4.0</p>
</div>

<script>
// =============================================
// DATA -- FAMILIES & CONCEPTS
// =============================================

const families = [
  {
    name: "Hardening Systeme",
    sessions: "S1",
    color: "#00B4D8", bg: "#0C353D",
    cards: [
      { name: "Defense en profondeur", aka: "Defense in Depth", desc: "Strategie de securite superposant plusieurs couches de protection independantes. Si une couche echoue, les suivantes prennent le relais. Concept fondamental repris par l'ANSSI.", example: "7 couches : physique, reseau, hote, application, donnees, utilisateur, politique" },
      { name: "Triade CIA", aka: "Confidentiality, Integrity, Availability", desc: "Les trois piliers fondamentaux de la securite de l'information : Confidentialite, Integrite, Disponibilite. Extension ANSSI : DICP (Disponibilite, Integrite, Confidentialite, Preuve).", example: "CIA + Preuve = DICP (referentiel ANSSI)" },
      { name: "Surface d'attaque", aka: "Attack Surface", desc: "Ensemble des points d'entree exploitables sur un systeme : ports ouverts, services actifs, comptes utilisateurs, binaires SUID. Reduire la surface d'attaque est le premier objectif du hardening.", example: "ss -tlnp -> lister tous les ports TCP en ecoute" },
      { name: "Principe du moindre privilege", aka: "Least Privilege", desc: "Chaque utilisateur, processus ou service ne doit disposer que des droits strictement necessaires a son fonctionnement. Limite l'impact en cas de compromission.", example: "visudo : restreindre les commandes autorisees par utilisateur" },
      { name: "10 piliers du hardening", aka: "CIS / ANSSI / STIG", desc: "Les axes majeurs du durcissement Linux : installation minimale, mises a jour, comptes et mots de passe, sudo, SSH, pare-feu, sysctl, audit, integrite fichiers, services.", example: "Debian netinstall + unattended-upgrades + nftables + auditd + AIDE" },
      { name: "Installation minimale", aka: "Minimal Install / netinstall", desc: "Installer uniquement les paquets essentiels pour reduire la surface d'attaque. Debian netinstall sans environnement de bureau. Partitionnement LVM avec separations /home, /var, /tmp.", example: "Debian 12 netinstall -> decocher 'Environnement de bureau'" },
      { name: "Durcissement SSH", aka: "SSH Hardening", desc: "Securisation du service OpenSSH : cles Ed25519, port non standard (2222), desactivation root login, restriction des algorithmes cryptographiques (KexAlgorithms, Ciphers, MACs), banniere legale.", example: "Port 2222, PermitRootLogin no, PubkeyAuthentication yes" },
      { name: "sysctl hardening", aka: "Kernel Parameters", desc: "Parametres noyau Linux pour la securite reseau et systeme. Configures dans /etc/sysctl.d/99-hardening.conf : SYN cookies, reverse path filtering, desactivation IP forwarding, restriction ICMP.", example: "net.ipv4.tcp_syncookies=1, kernel.dmesg_restrict=1" },
      { name: "fail2ban", aka: "Intrusion Prevention", desc: "Outil de prevention d'intrusion analysant les logs en temps reel. Bannit temporairement les IPs apres N echecs de connexion. Action nftables-multiport en S1.", example: "fail2ban-client status sshd -> voir les IPs bannies" },
      { name: "nftables", aka: "Netfilter Tables", desc: "Framework de filtrage de paquets Linux remplacant iptables. Politique DROP par defaut : seuls les flux explicitement autorises passent. Syntaxe structuree en tables, chaines et regles.", example: "nft list ruleset -> afficher toutes les regles actives" },
      { name: "Options de montage securisees", aka: "Mount Options", desc: "Restrictions appliquees aux partitions via /etc/fstab : noexec (pas d'execution), nosuid (ignorer les bits SUID), nodev (pas de peripheriques). Protege /tmp et /var.", example: "/tmp : noexec,nosuid,nodev dans /etc/fstab" },
      { name: "LUKS", aka: "Linux Unified Key Setup", desc: "Standard de chiffrement de disque sous Linux. Protege les donnees au repos (data at rest) en cas de vol physique. Compatible avec LVM.", example: "cryptsetup luksFormat /dev/sda2" },
      { name: "Protection GRUB", aka: "Bootloader Security", desc: "Protection du chargeur d'amorcage par mot de passe pour empecher la modification des parametres de demarrage (mode single user, init=/bin/bash).", example: "grub-mkpasswd-pbkdf2 -> /etc/grub.d/40_custom" },
      { name: "Desactivation des services inutiles", aka: "Service Minimization", desc: "Arreter et desactiver les services non necessaires pour reduire la surface d'attaque. Exemples courants : avahi-daemon, cups, bluetooth, ModemManager, exim4.", example: "systemctl disable --now avahi-daemon cups bluetooth" },
      { name: "unattended-upgrades", aka: "Auto Security Updates", desc: "Mecanisme Debian/Ubuntu pour appliquer automatiquement les mises a jour de securite. Configure pour ne pas redemarrer automatiquement en production.", example: "apt install unattended-upgrades && dpkg-reconfigure -plow unattended-upgrades" }
    ]
  },
  {
    name: "Authentification et Acces",
    sessions: "S1",
    color: "#009BCC", bg: "#0C313D",
    cards: [
      { name: "PAM", aka: "Pluggable Authentication Modules", desc: "Framework modulaire d'authentification sous Linux. Permet de configurer des politiques de mots de passe (longueur, complexite), le verrouillage de comptes et les limites de ressources.", example: "pam_pwquality.so : minlen=12, ucredit=-1, dcredit=-1" },
      { name: "SUID / SGID", aka: "Set User/Group ID", desc: "Bits speciaux sur les fichiers executables permettant de s'executer avec les droits du proprietaire (SUID) ou du groupe (SGID). Vecteur d'escalade de privileges si mal controle.", example: "find / -perm -4000 -type f 2>/dev/null -> lister les binaires SUID" },
      { name: "GTFOBins", aka: "Unix Binaries Exploitation", desc: "Base de donnees de binaires Unix legitimement presents sur les systemes pouvant etre exploites pour escalader les privileges, echapper a des environnements restreints ou exfiltrer des donnees.", example: "find . -exec /bin/sh \\; -> shell via find si SUID" },
      { name: "Permissions Linux", aka: "chmod / chown", desc: "Systeme de droits POSIX : lecture (r), ecriture (w), execution (x) pour proprietaire, groupe et autres. Les fichiers critiques (/etc/shadow, /etc/ssh/) doivent avoir des permissions restrictives.", example: "chmod 600 /etc/shadow (lecture/ecriture root uniquement)" },
      { name: "sudo", aka: "Superuser Do", desc: "Mecanisme d'elevation de privileges permettant a un utilisateur autorise d'executer des commandes en tant que root. Configurable finement dans /etc/sudoers avec log des commandes.", example: "Defaults log_input, log_output dans /etc/sudoers" },
      { name: "Limites PAM", aka: "/etc/security/limits.conf", desc: "Configuration des limites de ressources par utilisateur ou groupe : nombre maximal de processus, taille des fichiers, memoire. Previent les fork bombs et les abus de ressources.", example: "* hard nproc 150, * hard core 0" }
    ]
  },
  {
    name: "Audit et Journalisation",
    sessions: "S2",
    color: "#2C99D0", bg: "#0C2C3D",
    cards: [

// =============================================
// RENDERING FUNCTIONS
// =============================================

function renderFamilies() {
  const container = document.getElementById('familiesContainer');
  container.innerHTML = '';

  families.forEach((family, index) => {
    const groupDiv = document.createElement('div');
    groupDiv.className = 'family-group';
    groupDiv.setAttribute('data-family', family.name);

    const titleDiv = document.createElement('div');
    titleDiv.className = 'family-title';
    titleDiv.setAttribute('style', `--fam-color: ${family.color}`);
    titleDiv.textContent = family.name;
    groupDiv.appendChild(titleDiv);

    const sessionDiv = document.createElement('div');
    sessionDiv.className = 'family-session';
    sessionDiv.setAttribute('style', `color: ${family.color}`);
    sessionDiv.textContent = family.sessions;
    groupDiv.appendChild(sessionDiv);

    const cardsGrid = document.createElement('div');
    cardsGrid.className = 'cards-grid';

    family.cards.forEach(card => {
      const cardDiv = document.createElement('div');
      cardDiv.className = 'card';
      cardDiv.setAttribute('style', `--fam-color: ${family.color}; --card-bg-color: ${family.bg}`);
      cardDiv.setAttribute('data-search', `${card.name} ${card.aka} ${card.desc} ${card.example}`.toLowerCase());

      const tagDiv = document.createElement('div');
      tagDiv.className = 'card-session-tag';
      tagDiv.textContent = family.sessions;
      cardDiv.appendChild(tagDiv);

      const nameDiv = document.createElement('div');
      nameDiv.className = 'card-name';
      nameDiv.textContent = card.name;
      cardDiv.appendChild(nameDiv);

      const akaDiv = document.createElement('div');
      akaDiv.className = 'card-aka';
      akaDiv.textContent = card.aka;
      cardDiv.appendChild(akaDiv);

      const descDiv = document.createElement('div');
      descDiv.className = 'card-desc';
      descDiv.textContent = card.desc;
      cardDiv.appendChild(descDiv);

      const exampleDiv = document.createElement('div');
      exampleDiv.className = 'card-example';
      exampleDiv.textContent = card.example;
      cardDiv.appendChild(exampleDiv);

      cardsGrid.appendChild(cardDiv);
    });

    groupDiv.appendChild(cardsGrid);
    container.appendChild(groupDiv);
  });

  renderFilterPills();
}

function renderFilterPills() {
  const pillsDiv = document.getElementById('filterPills');
  pillsDiv.innerHTML = '';

  families.forEach(family => {
    const pill = document.createElement('button');
    pill.className = 'filter-pill';
    pill.textContent = family.name;
    pill.onclick = () => filterByFamily(family.name, pill);
    pillsDiv.appendChild(pill);
  });
}

function renderANSSI() {
  const container = document.getElementById('anssiContainer');
  container.innerHTML = '';

  anssiGuides.forEach(guide => {
    const sectionDiv = document.createElement('div');
    sectionDiv.className = 'anssi-section';
    sectionDiv.setAttribute('data-search', guide.title.toLowerCase());

    const headerDiv = document.createElement('div');
    headerDiv.className = 'anssi-guide-header';
    headerDiv.textContent = `Guide ${guide.guide}: ${guide.title}`;
    sectionDiv.appendChild(headerDiv);

    guide.recommendations.forEach(rec => {
      const recDiv = document.createElement('div');
      recDiv.className = 'anssi-recommendation';
      recDiv.setAttribute('data-search', `${rec.title} ${rec.desc} ${rec.ref}`.toLowerCase());

      const priorityBadge = document.createElement('div');
      priorityBadge.className = `anssi-priority-badge anssi-priority-${rec.priority.toLowerCase().replace('-', '')}`;
      priorityBadge.textContent = rec.priority;
      recDiv.appendChild(priorityBadge);

      const contentDiv = document.createElement('div');
      contentDiv.className = 'anssi-rec-content';

      const titleDiv = document.createElement('div');
      titleDiv.className = 'anssi-rec-title';
      titleDiv.textContent = rec.title;
      contentDiv.appendChild(titleDiv);

      const descDiv = document.createElement('div');
      descDiv.className = 'anssi-rec-desc';
      descDiv.textContent = rec.desc;
      contentDiv.appendChild(descDiv);

      const refDiv = document.createElement('div');
      refDiv.className = 'anssi-rec-ref';
      refDiv.textContent = rec.ref;
      contentDiv.appendChild(refDiv);

      recDiv.appendChild(contentDiv);
      sectionDiv.appendChild(recDiv);
    });

    container.appendChild(sectionDiv);
  });
}

function renderAbbreviations() {
  const container = document.getElementById('abbrContainer');
  container.innerHTML = '';

  Object.entries(abbreviations).forEach(([key, category]) => {
    const categoryDiv = document.createElement('div');
    categoryDiv.className = 'abbr-category';
    categoryDiv.setAttribute('data-search', category.label.toLowerCase());

    const titleDiv = document.createElement('div');
    titleDiv.className = 'abbr-category-title';
    titleDiv.textContent = category.label;
    categoryDiv.appendChild(titleDiv);

    const descDiv = document.createElement('div');
    descDiv.className = 'abbr-category-desc';
    descDiv.textContent = category.desc;
    categoryDiv.appendChild(descDiv);

    const table = document.createElement('table');
    table.className = 'abbr-table';

    const thead = document.createElement('thead');
    const headerRow = document.createElement('tr');
    const headers = ['Abreviation', 'Terme Complet', 'Contexte'];
    headers.forEach(h => {
      const th = document.createElement('th');
      th.textContent = h;
      headerRow.appendChild(th);
    });
    thead.appendChild(headerRow);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    category.items.forEach(item => {
      const row = document.createElement('tr');
      row.setAttribute('data-search', `${item.abbr} ${item.full} ${item.ctx}`.toLowerCase());

      const abbrTd = document.createElement('td');
      abbrTd.textContent = item.abbr;
      row.appendChild(abbrTd);

      const fullTd = document.createElement('td');
      fullTd.textContent = item.full;
      row.appendChild(fullTd);

      const ctxTd = document.createElement('td');
      ctxTd.textContent = item.ctx;
      row.appendChild(ctxTd);

      tbody.appendChild(row);
    });
    table.appendChild(tbody);

    categoryDiv.appendChild(table);
    container.appendChild(categoryDiv);
  });
}

function switchView(viewName) {
  const views = document.querySelectorAll('.view-section');
  views.forEach(v => v.classList.remove('active'));
  document.getElementById(viewName + '-view').classList.add('active');

  const tabs = document.querySelectorAll('.nav-tab');
  tabs.forEach(t => {
    t.classList.remove('active', 'active-anssi', 'active-abbr');
  });

  if (viewName === 'families') {
    tabs[0].classList.add('active');
  } else if (viewName === 'anssi') {
    tabs[1].classList.add('active-anssi');
  } else if (viewName === 'abbr') {
    tabs[2].classList.add('active-abbr');
  }

  filterContent();
}

function filterByFamily(familyName, pillElement) {
  const pills = document.querySelectorAll('.filter-pill');
  pills.forEach(p => p.classList.remove('active'));
  pillElement.classList.add('active');
  filterContent();
}

function filterContent() {
  const searchQuery = document.getElementById('searchInput').value.toLowerCase();
  const activeView = document.querySelector('.view-section.active').id;
  let visibleCount = 0;

  if (activeView === 'families-view') {
    const activePill = document.querySelector('.filter-pill.active');
    const selectedFamily = activePill ? activePill.textContent : null;

    document.querySelectorAll('.family-group').forEach(group => {
      const familyName = group.getAttribute('data-family');
      let isVisible = !selectedFamily || familyName === selectedFamily;

      if (isVisible) {
        group.querySelectorAll('.card').forEach(card => {
          const searchAttr = card.getAttribute('data-search');
          const matches = !searchQuery || searchAttr.includes(searchQuery);
          card.style.display = matches ? '' : 'none';
          if (matches) visibleCount++;
        });
        group.style.display = group.querySelectorAll('.card:not([style*="none"])').length > 0 ? '' : 'none';
      } else {
        group.style.display = 'none';
      }
    });
  } else if (activeView === 'anssi-view') {
    document.querySelectorAll('.anssi-recommendation').forEach(rec => {
      const searchAttr = rec.getAttribute('data-search');
      const matches = !searchQuery || searchAttr.includes(searchQuery);
      rec.style.display = matches ? '' : 'none';
      if (matches) visibleCount++;
    });

    document.querySelectorAll('.anssi-section').forEach(section => {
      const hasVisibleRecs = section.querySelectorAll('.anssi-recommendation:not([style*="none"])').length > 0;
      section.style.display = hasVisibleRecs ? '' : 'none';
    });
  } else if (activeView === 'abbr-view') {
    document.querySelectorAll('.abbr-category').forEach(category => {
      category.querySelectorAll('tbody tr').forEach(row => {
        const searchAttr = row.getAttribute('data-search');
        const matches = !searchQuery || searchAttr.includes(searchQuery);
        row.style.display = matches ? 'table-row' : 'none';
        if (matches) visibleCount++;
      });

      const hasVisibleRows = category.querySelectorAll('tbody tr:not([style*="none"])').length > 0;
      category.style.display = hasVisibleRows ? '' : 'none';
    });
  }

  document.getElementById('resultCount').textContent = visibleCount;
}

// =============================================
// INITIALIZATION
// =============================================

document.addEventListener('DOMContentLoaded', () => {
  renderFamilies();
  renderANSSI();
  renderAbbreviations();
  filterContent();
});
